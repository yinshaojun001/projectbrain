name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Smoke test CLI
        run: |
          projectbrain doctor
          projectbrain facts context \
            --export-json examples/payment-mini/projectbrain-codegraph-export.json \
            --experience-seed examples/payment-mini/experience-seed.md \
            --task "Explain the settlement entrypoint" >/tmp/context-pack.json
          printf '{"jsonrpc":"2.0","id":1,"method":"tools/list"}\n' | \
            projectbrain mcp serve >/tmp/mcp-tools.json
